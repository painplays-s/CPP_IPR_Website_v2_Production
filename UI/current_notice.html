<!-- UI/current_notice.html -->

<style>
  :root {
    --notice-bg: #ffffff;
    --notice-border: #d8dee9;
    --notice-text: #1f2937;
    --notice-muted: #6b7280;
    --notice-accent: #1d4ed8;
    --notice-radius-lg: 16px;
  }

  /* OUTER WRAPPER */
  .current-notice {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    box-sizing: border-box;
  }

  /* HEADER */
  .notice-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0 0.4rem;
    flex-wrap: wrap;
  }

  .notice-title {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--notice-text);
  }

  .notice-subtitle {
    font-size: 0.9rem;
    color: var(--notice-muted);
  }

  /* MAIN CARD */
  .notice-main {
    position: relative;
    width: 100%;
    background: var(--notice-bg);
    border: 1.5px solid var(--notice-border);
    border-radius: var(--notice-radius-lg);
    overflow: hidden;
    min-height: 260px;
  }

  /* SCROLL AREA */
  .notice-scroll {
    position: absolute;
    inset: 0;
    padding: 1.2rem 1.4rem;
    box-sizing: border-box;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .notice-scroll::-webkit-scrollbar {
    width: 6px;
  }

  .notice-scroll::-webkit-scrollbar-thumb {
    background: rgba(31, 41, 55, 0.3);
    border-radius: 999px;
  }

  /* NOTICE LIST */
  .notice-list {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  /* NOTICE ITEM - Type on top */
  .notice-item {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--notice-text);
    text-align: left;
    word-break: break-word;
    padding: 0.5rem 0 0.7rem 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    width: 100%;
    cursor: pointer;
  }

  .notice-item:last-child {
    border-bottom: none;
  }

  /* Type header with NEW badge on right */
  .notice-type-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.1rem;
    flex-wrap: wrap;
  }

  /* Type on top left */
  .notice-type {
    font-weight: 600;
    color: var(--notice-accent);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: inline-block;
    width: fit-content;
    padding: 0.15rem 0.5rem;
    background-color: rgba(29, 78, 216, 0.05);
    border-radius: 4px;
  }

  /* New badge/image - moved to right of type */
  .notice-new {
    height: 14px;
    width: auto;
    vertical-align: middle;
  }

  /* Content wrapper */
  .notice-content-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    width: 100%;
  }

  /* Link container */
  .notice-link {
    color: var(--notice-text);
    text-decoration: none;
    transition: color 0.2s ease;
    word-break: break-word;
    display: inline-block;
    text-align: justify;
    text-justify: inter-word;
  }

  .notice-link:hover {
    color: var(--notice-accent);
    text-decoration: underline;
  }

  /* Date style */
  .notice-date {
    font-size: 0.7rem;
    color: var(--notice-muted);
    margin-top: 0.1rem;
    display: block;
  }

  .notice-empty {
    font-size: 0.9rem;
    color: var(--notice-muted);
    text-align: center;
    padding: 1rem 0;
  }

  /* PDF Modal Styles (same as RTI page) */
  .notice-pdf-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    z-index: 10000;
    overflow-y: auto;
    cursor: pointer;
  }

  .notice-pdf-modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .notice-pdf-modal-content {
    position: relative;
    width: 95%;
    max-width: 1400px;
    height: 92vh;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    cursor: default;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  .notice-pdf-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #003366;
    color: white;
    font-weight: 600;
  }

  .notice-pdf-modal-header h4 {
    margin: 0;
    font-size: 1rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .notice-pdf-close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    padding: 0 8px;
    transition: opacity 0.2s;
  }

  .notice-pdf-close-btn:hover {
    opacity: 0.8;
  }

  .notice-pdf-viewer {
    width: 100%;
    height: calc(92vh - 50px);
    border: none;
  }

  /* ---------- TABLET ---------- */
  @media (max-width: 1024px) {
    .current-notice {
      max-width: 100%;
    }
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 900px) {
    .notice-main {
      position: relative;
      height: auto !important;
      min-height: 220px;
    }

    .notice-scroll {
      position: relative;
      max-height: 320px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .notice-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .notice-subtitle {
      text-align: left;
    }

    .notice-content-wrapper {
      flex-wrap: wrap;
    }

    .notice-pdf-modal-content {
      width: 98%;
      height: 90vh;
    }

    .notice-pdf-modal-header h4 {
      max-width: 180px;
      font-size: 0.85rem;
    }

    .notice-pdf-viewer {
      height: calc(90vh - 50px);
    }
  }

  /* Small mobile screens */
  @media (max-width: 480px) {
    .notice-content-wrapper {
      flex-direction: column;
      gap: 0.3rem;
    }

    .notice-type-header {
      flex-wrap: wrap;
    }

    .notice-pdf-modal-header h4 {
      max-width: 120px;
      font-size: 0.8rem;
    }
  }
</style>

<div class="current-notice" id="current-notice-root">

  <div class="notice-header">
    <div class="notice-title" id="notice-title-text">Current Notices</div>
    <div class="notice-subtitle" id="notice-subtitle-text">
      Latest official announcements
    </div>
  </div>

  <div class="notice-main" id="notice-main">
    <div class="notice-scroll" id="notice-scroll">
      <div class="notice-list" id="notice-list"></div>
    </div>
  </div>

</div>

<!-- PDF Modal for embedded viewing -->
<div id="noticePdfModal" class="notice-pdf-modal">
  <div class="notice-pdf-modal-content">
    <div class="notice-pdf-modal-header">
      <h4 id="noticePdfModalTitle">PDF Document</h4>
      <button class="notice-pdf-close-btn" id="noticePdfCloseBtn">&times;</button>
    </div>
    <iframe id="noticePdfViewerFrame" class="notice-pdf-viewer" src=""></iframe>
  </div>
</div>

<script>
  (function () {

    const DATA_URL = '/api/current-notice';

    const listEl = document.getElementById('notice-list');
    const scrollEl = document.getElementById('notice-scroll');
    const noticeMain = document.getElementById('notice-main');

    let cachedData = [];

    // PDF Modal elements
    const pdfModal = document.getElementById('noticePdfModal');
    const pdfFrame = document.getElementById('noticePdfViewerFrame');
    const pdfModalTitle = document.getElementById('noticePdfModalTitle');
    const pdfCloseBtn = document.getElementById('noticePdfCloseBtn');

    const headerText = {
      en: {
        title: 'Current Notices',
        subtitle: 'Latest official announcements'
      },
      hi: {
        title: 'वर्तमान सूचनाएँ',
        subtitle: 'नवीनतम आधिकारिक घोषणाएँ'
      }
    };

    function getCurrentLang() {
      return localStorage.getItem('preferred-language') || 'en';
    }

    function applyHeaderLang(lang) {
      const set = headerText[lang] || headerText.en;
      const titleEl = document.getElementById('notice-title-text');
      const subtitleEl = document.getElementById('notice-subtitle-text');
      if (titleEl) titleEl.textContent = set.title;
      if (subtitleEl) subtitleEl.textContent = set.subtitle;
    }

    function getDescription(item, lang) {
      if (lang === 'hi' && item.description_hi) return item.description_hi;
      return item.description_en || '';
    }

    // Format date function
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString('en-IN', {
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        });
      } catch (e) {
        return '';
      }
    }

    // Check if URL is a PDF file
    function isPdfFile(filename) {
      if (!filename) return false;
      return filename.toLowerCase().endsWith('.pdf');
    }

    // Get PDF URL
    function getPdfUrl(filename) {
      return '/assets/files/currentNotice/' + filename;
    }

    // Open PDF in modal
    function openPdfModal(pdfUrl, fileName) {
      if (!pdfModal || !pdfFrame) return;
      pdfFrame.src = pdfUrl;
      pdfModalTitle.textContent = fileName || 'PDF Document';
      pdfModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Close PDF modal
    function closePdfModal() {
      if (!pdfModal) return;
      pdfModal.classList.remove('active');
      setTimeout(() => {
        if (pdfFrame) pdfFrame.src = '';
      }, 300);
      document.body.style.overflow = '';
    }

    // Handle notice item click - open PDF in modal if PDF, otherwise external link
    function handleNoticeClick(item, event) {
      // If the click target is a link or inside a link, let it handle naturally
      if (event.target.closest('a')) {
        return;
      }

      event.preventDefault();
      const filename = item.filename;
      const description = getDescription(item, getCurrentLang());

      if (isPdfFile(filename)) {
        const pdfUrl = getPdfUrl(filename);
        openPdfModal(pdfUrl, description);
      } else if (filename) {
        // For non-PDF files, open in new tab
        window.open(getPdfUrl(filename), '_blank');
      }
    }

    // Create notice item with type on top and NEW badge on right
    function createNoticeItem(item, lang) {
      const div = document.createElement('div');
      div.className = 'notice-item';

      // Store item data for click handler
      div.setAttribute('data-filename', item.filename || '');
      div.setAttribute('data-description', getDescription(item, lang));
      div.setAttribute('data-is-pdf', isPdfFile(item.filename));

      // Type header with NEW badge on right
      const typeHeader = document.createElement('div');
      typeHeader.className = 'notice-type-header';

      // Type span first
      const typeSpan = document.createElement('span');
      typeSpan.className = 'notice-type';
      typeSpan.textContent = item.type;
      typeHeader.appendChild(typeSpan);

      // Add NEW badge after type if item is new
      if (item.is_new) {
        const img = document.createElement('img');
        img.src = '/assets/images/new.gif';
        img.className = 'notice-new';
        img.alt = 'New';
        typeHeader.appendChild(img);
      }

      // Content wrapper for link and date
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'notice-content-wrapper';

      // Link
      const link = document.createElement('a');
      link.className = 'notice-link';

      // For PDF files, link opens in modal (via JavaScript)
      // For other files, direct open
      if (isPdfFile(item.filename)) {
        link.href = 'javascript:void(0)';
        link.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          const pdfUrl = getPdfUrl(item.filename);
          openPdfModal(pdfUrl, getDescription(item, lang));
        };
      } else if (item.filename) {
        link.href = getPdfUrl(item.filename);
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
      } else {
        link.href = 'javascript:void(0)';
      }

      link.textContent = getDescription(item, lang);

      contentWrapper.appendChild(link);

      // Add date below the description
      if (item.uploaded_at) {
        const dateSpan = document.createElement('div');
        dateSpan.className = 'notice-date';
        dateSpan.textContent = formatDate(item.uploaded_at);
        contentWrapper.appendChild(dateSpan);
      }

      div.appendChild(typeHeader);
      div.appendChild(contentWrapper);

      // Add click handler to the entire item for PDF modal
      if (isPdfFile(item.filename)) {
        div.style.cursor = 'pointer';
        div.addEventListener('click', (e) => {
          handleNoticeClick(item, e);
        });
      }

      return div;
    }

    /* HEIGHT SYNC — EXACT SAME LOGIC AS BEFORE */
    function syncHeightWithCarousel() {
      if (window.innerWidth < 900) {
        if (noticeMain) noticeMain.style.height = 'auto';
        return;
      }

      const carouselMain = document.querySelector('.carousel-main');
      if (!carouselMain || !noticeMain) return;

      noticeMain.style.height =
        carouselMain.getBoundingClientRect().height + 'px';
    }

    // Build list with type on top and NEW badge on right
    function buildList(data) {
      if (!listEl) return;
      listEl.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'notice-empty';
        emptyDiv.textContent = 'No notices available.';
        listEl.appendChild(emptyDiv);
        return;
      }

      const lang = getCurrentLang();

      // Sort data - new notices first
      const sortedData = [...data].sort((a, b) => {
        if (a.is_new && !b.is_new) return -1;
        if (!a.is_new && b.is_new) return 1;
        return 0;
      });

      // Create all notice items
      sortedData.forEach(item => {
        listEl.appendChild(createNoticeItem(item, lang));
      });

      syncHeightWithCarousel();
    }

    // Apply language to current notices
    window.applyCurrentNoticeLang = function (lang) {
      applyHeaderLang(lang);
      buildList(cachedData);
    };

    // Setup PDF modal close handlers
    function setupPdfModal() {
      if (pdfCloseBtn) {
        pdfCloseBtn.addEventListener('click', closePdfModal);
      }

      if (pdfModal) {
        pdfModal.addEventListener('click', function (e) {
          if (e.target === pdfModal) {
            closePdfModal();
          }
        });
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && pdfModal && pdfModal.classList.contains('active')) {
          closePdfModal();
        }
      });
    }

    function init() {
      applyHeaderLang(getCurrentLang());
      setupPdfModal();

      fetch(DATA_URL)
        .then(res => res.json())
        .then(data => {
          cachedData = Array.isArray(data) ? data : [];
          buildList(cachedData);
        })
        .catch(() => {
          if (listEl) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'notice-empty';
            emptyDiv.textContent = 'Unable to load notices.';
            listEl.appendChild(emptyDiv);
          }
        });

      window.addEventListener('resize', () => {
        syncHeightWithCarousel();
      });
    }

    init();

  })();
</script>
