<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ error_code }} - {{ error_title }}</title>
  <style>
    /* =====================================================
       ERROR PAGE STYLES
       ===================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    .error-container {
      max-width: 600px;
      width: 90%;
      margin: 2rem auto;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-card {
      background: #020617;
      border-radius: 24px;
      padding: 3rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      position: relative;
      overflow: hidden;
    }

    /* Decorative elements */
    .error-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
      animation: rotate 20s linear infinite;
      z-index: 0;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-content {
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f59e0b, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .error-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }

    .error-message {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      padding: 0 1rem;
    }

    .error-description {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
      font-size: 0.95rem;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .error-link {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .error-link:hover {
      color: #ec4899;
      text-decoration: underline;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      min-width: 140px;
    }

    .btn-primary {
      background: linear-gradient(to right, #f59e0b, #ec4899);
      color: #0b1120;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(148, 163, 184, 0.3);
      color: #e5e7eb;
    }

    .btn-secondary:hover {
      background: rgba(148, 163, 184, 0.1);
      border-color: rgba(148, 163, 184, 0.5);
      transform: translateY(-2px);
    }

    .error-details {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      .error-card {
        padding: 2rem 1.5rem;
      }

      .error-code {
        font-size: 6rem;
      }

      .error-title {
        font-size: 1.5rem;
      }

      .error-message {
        font-size: 1rem;
      }

      .btn {
        width: 100%;
      }
    }

    /* Specific styles for different error codes */
    .error-403 .error-code {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-404 .error-code {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-500 .error-code {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="error-{{ error_code }}">
  <div class="error-container">
    <div class="error-card">
      <div class="error-content">
        <div class="error-code">{{ error_code }}</div>
        <h1 class="error-title">{{ error_title }}</h1>
        <p class="error-message">{{ error_message }}</p>
        
        {% if error_description %}
        <div class="error-description">
          {{ error_description|safe }}
        </div>
        {% endif %}
        
        <div class="action-buttons">
          <a href="javascript:history.back()" class="btn btn-secondary">
            ← Go Back
          </a>
          <a href="/" class="btn btn-primary">
            Go to Homepage
          </a>
        </div>

        <div class="error-details">
          <p>If you need assistance, please contact the administrator.</p>
          <p style="margin-top: 0.5rem;">
            <a href="mailto:pso.it@cppipr.res.in" class="error-link">pso.it@cppipr.res.in</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Optional: Log error to console in development
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      console.log('Error {{ error_code }}: {{ error_title }}');
    }
  </script>
</body>
</html>
