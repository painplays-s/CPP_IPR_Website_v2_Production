<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenders - CPP-IPR</title>

  <style>
    :root {
      --tender-bg: #ffffff;
      --tender-border: #d0d7e2;
      --tender-text: #111827;
      --tender-muted: #6b7280;
      --tender-accent: #2563eb;
      --tender-radius-lg: 16px;
      --new-badge-bg: #ef4444;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    #header-container,
    #footer-container {
      flex-shrink: 0;
    }

    main {
      flex: 1;
      padding: 1.5rem 5vw;
      box-sizing: border-box;
    }

    /* ---------- GLOBAL SECTION WIDTH ---------- */
    .page-section {
      max-width: 1600px;
      margin: 0 auto 2rem auto;
    }

    /* ---------- TENDER SECTION STYLES ---------- */
    .tender-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-sizing: border-box;
    }

    /* BANNER IMAGE */
    .tender-banner {
      width: 100%;
      height: auto;
      border-radius: var(--tender-radius-lg);
      object-fit: cover;
    }

    /* MAIN BODY */
    .tender-main {
      position: relative;
      width: 100%;
      background: var(--tender-bg);
      border: 1.5px solid var(--tender-border);
      border-radius: var(--tender-radius-lg);
      overflow: hidden;
    }

    /* HEADER INSIDE BOX */
    .tender-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.75rem 1rem 1.75rem;
      position: relative;
    }

    .tender-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 2px;
      background-color: var(--tender-border);
    }

    .tender-title {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--tender-text);
      text-align: center;
      margin: 0;
    }

    /* CONTENT AREA */
    .tender-content {
      padding: 1.75rem 1.75rem;
      box-sizing: border-box;
    }

    /* YEAR TABS */
    .year-tabs {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .year-tab {
      padding: 0.65rem 1.5rem;
      background: #f3f4f6;
      border: 1.5px solid var(--tender-border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
      font-weight: 500;
      color: var(--tender-text);
    }

    .year-tab:hover {
      background: #e5e7eb;
      border-color: var(--tender-accent);
    }

    .year-tab.active {
      background: var(--tender-accent);
      color: white;
      border-color: var(--tender-accent);
    }

    /* CONTROLS BAR */
    .tender-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .items-per-page {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--tender-text);
    }

    .items-per-page select {
      padding: 0.4rem 0.75rem;
      border: 1.5px solid var(--tender-border);
      border-radius: 6px;
      background: white;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .items-per-page select:focus {
      outline: none;
      border-color: var(--tender-accent);
    }

    .tender-stats {
      color: var(--tender-muted);
      font-size: 0.95rem;
    }

    /* LOADING STATE */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--tender-muted);
      font-size: 1.1rem;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--tender-muted);
    }

    .empty-state p {
      font-size: 1.1rem;
      margin: 0;
    }

    /* TABLE CONTAINER */
    .table-container {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1.5px solid var(--tender-border);
    }

    .tender-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    .tender-table thead {
      background: #f9fafb;
    }

    .tender-table th {
      padding: 1rem 1.25rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--tender-text);
      border-bottom: 2px solid var(--tender-border);
    }

    .tender-table td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.95rem;
      color: var(--tender-text);
      vertical-align: top;
    }

    .tender-table tbody tr:hover {
      background: #f9fafb;
    }

    .tender-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* NEW BADGE */
    .new-badge {
      display: inline-block;
      background: var(--new-badge-bg);
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 0.5rem;
      animation: blink 1.5s infinite;
      vertical-align: middle;
    }

    @keyframes blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0.6;
      }
    }

    /* TENDER NUMBER */
    .tender-no {
      font-weight: 600;
      color: var(--tender-accent);
    }

    /* DATE */
    .tender-date {
      color: var(--tender-muted);
      font-size: 0.9rem;
    }

    /* DOWNLOAD LINK - Now styled as button */
    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--tender-accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.95rem;
    }

    .download-link:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .download-link::before {
      content: '📄';
      font-size: 1.1rem;
    }

    /* PAGINATION */
    .pagination-container {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
    }

    .pagination {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .page-btn {
      min-width: 40px;
      height: 40px;
      padding: 0 0.75rem;
      border: 1.5px solid var(--tender-border);
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--tender-text);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled):not(.active) {
      background: #f3f4f6;
      border-color: var(--tender-accent);
    }

    .page-btn.active {
      background: var(--tender-accent);
      color: white;
      border-color: var(--tender-accent);
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f3f4f6;
    }

    .page-btn.dots {
      border: none;
      cursor: default;
      background: transparent;
    }

    .page-btn.dots:hover {
      background: transparent;
      border-color: var(--tender-border);
    }

    /* PDF Modal Styles */
    .tender-pdf-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      overflow-y: auto;
      cursor: pointer;
    }

    .tender-pdf-modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tender-pdf-modal-content {
      position: relative;
      width: 95%;
      max-width: 1400px;
      height: 92vh;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      cursor: default;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .tender-pdf-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #003366;
      color: white;
      font-weight: 600;
    }

    .tender-pdf-modal-header h4 {
      margin: 0;
      font-size: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .tender-pdf-close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      padding: 0 8px;
      transition: opacity 0.2s;
    }

    .tender-pdf-close-btn:hover {
      opacity: 0.8;
    }

    .tender-pdf-viewer {
      width: 100%;
      height: calc(92vh - 50px);
      border: none;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .tender-title {
        font-size: 1.35rem;
      }

      .tender-header {
        padding: 1.25rem 1.25rem 0.85rem 1.25rem;
      }

      .tender-header::after {
        width: 80%;
      }

      .tender-content {
        padding: 1.5rem 1.25rem;
      }

      .year-tabs {
        gap: 0.5rem;
      }

      .year-tab {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }

      .tender-controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .items-per-page {
        width: 100%;
        justify-content: space-between;
      }

      .tender-stats {
        width: 100%;
        text-align: center;
      }

      /* MOBILE TABLE TO CARDS */
      .table-container {
        border: none;
      }

      .tender-table {
        min-width: unset;
      }

      .tender-table thead {
        display: none;
      }

      .tender-table tbody,
      .tender-table tr,
      .tender-table td {
        display: block;
        width: 100%;
      }

      .tender-table tr {
        margin-bottom: 1.5rem;
        border: 1.5px solid var(--tender-border);
        border-radius: 12px;
        background: white;
        overflow: hidden;
      }

      .tender-table td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #f3f4f6;
        position: relative;
        padding-left: 45%;
        text-align: right;
      }

      .tender-table td:last-child {
        border-bottom: none;
      }

      .tender-table td::before {
        content: attr(data-label);
        position: absolute;
        left: 1rem;
        width: 40%;
        text-align: left;
        font-weight: 600;
        color: var(--tender-text);
      }

      .tender-table tbody tr:hover {
        background: white;
      }

      .pagination {
        gap: 0.25rem;
      }

      .page-btn {
        min-width: 36px;
        height: 36px;
        padding: 0 0.5rem;
        font-size: 0.85rem;
      }

      .tender-pdf-modal-content {
        width: 98%;
        height: 90vh;
      }

      .tender-pdf-modal-header h4 {
        max-width: 180px;
        font-size: 0.85rem;
      }

      .tender-pdf-viewer {
        height: calc(90vh - 50px);
      }
    }

    @media (max-width: 480px) {
      .tender-pdf-modal-header h4 {
        max-width: 120px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- PDF Modal for embedded viewing -->
  <div id="tenderPdfModal" class="tender-pdf-modal">
    <div class="tender-pdf-modal-content">
      <div class="tender-pdf-modal-header">
        <h4 id="tenderPdfModalTitle">Tender Document</h4>
        <button class="tender-pdf-close-btn" id="tenderPdfCloseBtn">&times;</button>
      </div>
      <iframe id="tenderPdfViewerFrame" class="tender-pdf-viewer" src=""></iframe>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <main>
    <div class="page-section tender-section">

      <!-- BANNER IMAGE -->
      <img src="/assets/images/about_banner.jpg" alt="CPP-IPR Banner" class="tender-banner">

      <!-- MAIN BODY -->
      <div class="tender-main">

        <!-- HEADER INSIDE BOX -->
        <div class="tender-header">
          <h1 class="tender-title bilingual-title" data-hi="निविदाएं" data-en="Tenders">
            Tenders
          </h1>
        </div>

        <!-- CONTENT -->
        <div class="tender-content">

          <!-- YEAR TABS -->
          <div class="year-tabs" id="yearTabs">
            <!-- Tabs will be populated dynamically -->
          </div>

          <!-- CONTROLS BAR -->
          <div class="tender-controls" id="tenderControls" style="display: none;">
            <div class="items-per-page">
              <label for="itemsPerPage" class="bilingual-text" data-hi="प्रति पृष्ठ:" data-en="Items per page:">
                Items per page:
              </label>
              <select id="itemsPerPage">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
            <div class="tender-stats" id="tenderStats">
              <!-- Stats will be updated dynamically -->
            </div>
          </div>

          <!-- TENDERS TABLE -->
          <div id="tendersContainer">
            <div class="loading">Loading tenders...</div>
          </div>

          <!-- PAGINATION -->
          <div class="pagination-container" id="paginationContainer" style="display: none;">
            <div class="pagination" id="pagination"></div>
          </div>

        </div>
      </div>

      <div>
        <p class="bilingual-text" data-hi="*2026 से पहले प्रकाशित निविदाओं हेतु, कृपया हमारी पुरानी वेबसाइट देखें।"
          data-en="*For tenders published prior to 2026, kindly visit our old website.">
          *For tenders published prior to 2026, kindly visit our old website.
        </p>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- FRAGMENT LOADER -->
  <script>
    function loadFragment(url, containerId) {
      fetch(url)
        .then(res => res.text())
        .then(html => {
          const container = document.getElementById(containerId);
          container.innerHTML = html;

          container.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            oldScript.replaceWith(newScript);
          });
        })
        .catch(err => console.error('Error loading fragment:', url, err));
    }

    loadFragment('/UI/header.html', 'header-container');
    loadFragment('/UI/footer.html', 'footer-container');
  </script>

  <!-- TENDERS LOGIC WITH PAGINATION AND PDF MODAL -->
  <script>
    // PDF Modal elements
    const pdfModal = document.getElementById('tenderPdfModal');
    const pdfFrame = document.getElementById('tenderPdfViewerFrame');
    const pdfModalTitle = document.getElementById('tenderPdfModalTitle');
    const pdfCloseBtn = document.getElementById('tenderPdfCloseBtn');

    // PDF Modal functions
    function openTenderPdfModal(pdfUrl, fileName) {
      if (!pdfModal || !pdfFrame) return;
      pdfFrame.src = pdfUrl;
      pdfModalTitle.textContent = fileName || 'Tender Document';
      pdfModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeTenderPdfModal() {
      if (!pdfModal) return;
      pdfModal.classList.remove('active');
      setTimeout(() => {
        if (pdfFrame) pdfFrame.src = '';
      }, 300);
      document.body.style.overflow = '';
    }

    // Setup PDF modal close handlers
    function setupPdfModal() {
      if (pdfCloseBtn) {
        pdfCloseBtn.addEventListener('click', closeTenderPdfModal);
      }

      if (pdfModal) {
        pdfModal.addEventListener('click', function (e) {
          if (e.target === pdfModal) {
            closeTenderPdfModal();
          }
        });
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && pdfModal && pdfModal.classList.contains('active')) {
          closeTenderPdfModal();
        }
      });
    }

    // Check if file is PDF
    function isPdfFile(filename) {
      if (!filename) return false;
      return filename.toLowerCase().endsWith('.pdf');
    }

    // Get PDF URL
    function getTenderPdfUrl(filename) {
      return '/assets/files/tenders/' + filename;
    }

    // State variables
    let currentYear = new Date().getFullYear();
    let allYears = [];
    let currentPage = 1;
    let itemsPerPage = 20;
    let totalItems = 0;
    let totalPages = 1;
    let currentTenders = [];

    // Load on page ready
    document.addEventListener('DOMContentLoaded', async () => {
      setupPdfModal();
      await loadYears();
      await loadTenders(currentYear, currentPage);

      // Setup items per page change listener
      const itemsPerPageSelect = document.getElementById('itemsPerPage');
      if (itemsPerPageSelect) {
        itemsPerPageSelect.addEventListener('change', (e) => {
          changeItemsPerPage(e.target.value);
        });
      }
    });

    // Load available years
    async function loadYears() {
      try {
        const res = await fetch('/api/tenders/years');
        const data = await res.json();
        allYears = data.years;

        if (allYears.length === 0) {
          allYears = [currentYear];
        }

        renderYearTabs();
      } catch (err) {
        console.error('Error loading years:', err);
        allYears = [currentYear];
        renderYearTabs();
      }
    }

    // Render year tabs
    function renderYearTabs() {
      const container = document.getElementById('yearTabs');
      container.innerHTML = '';

      allYears.forEach(year => {
        const tab = document.createElement('div');
        tab.className = 'year-tab';
        tab.textContent = year;
        if (year === currentYear) tab.classList.add('active');
        tab.onclick = () => switchYear(year);
        container.appendChild(tab);
      });
    }

    // Switch year
    async function switchYear(year) {
      currentYear = year;
      currentPage = 1; // Reset to first page
      renderYearTabs();
      await loadTenders(year, currentPage);
    }

    // Change items per page
    async function changeItemsPerPage(value) {
      itemsPerPage = parseInt(value);
      currentPage = 1; // Reset to first page
      await loadTenders(currentYear, currentPage);
    }

    // Load tenders with pagination
    async function loadTenders(year, page) {
      const container = document.getElementById('tendersContainer');
      const controls = document.getElementById('tenderControls');
      const paginationContainer = document.getElementById('paginationContainer');

      container.innerHTML = '<div class="loading">Loading tenders...</div>';
      controls.style.display = 'none';
      paginationContainer.style.display = 'none';

      try {
        const res = await fetch(`/api/tenders/year/${year}`);
        const data = await res.json();

        const allTenders = data.tenders || [];
        totalItems = allTenders.length;
        totalPages = Math.ceil(totalItems / itemsPerPage);

        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        currentTenders = allTenders.slice(start, end);

        renderTenders(currentTenders);
        updatePagination();
        updateStats();

        controls.style.display = 'flex';
        if (totalPages > 1) {
          paginationContainer.style.display = 'flex';
        }
      } catch (err) {
        console.error('Error loading tenders:', err);
        container.innerHTML = '<div class="empty-state"><p>Error loading tenders. Please try again later.</p></div>';
      }
    }

    // Update statistics
    function updateStats() {
      const statsElement = document.getElementById('tenderStats');
      const start = ((currentPage - 1) * itemsPerPage) + 1;
      const end = Math.min(currentPage * itemsPerPage, totalItems);

      statsElement.innerHTML = `
        <span class="bilingual-text" 
              data-hi="दिखा रहा है ${start}-${end} कुल ${totalItems} निविदाओं में से" 
              data-en="Showing ${start}-${end} of ${totalItems} tenders">
          Showing ${start}-${end} of ${totalItems} tenders
        </span>
      `;
    }

    // Update pagination controls
    function updatePagination() {
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      const prevBtn = createPageButton('Prev', currentPage - 1, currentPage === 1);
      pagination.appendChild(prevBtn);

      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        pagination.appendChild(createPageButton('1', 1));
        if (startPage > 2) {
          pagination.appendChild(createDots());
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        pagination.appendChild(createPageButton(i.toString(), i, false, i === currentPage));
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          pagination.appendChild(createDots());
        }
        pagination.appendChild(createPageButton(totalPages.toString(), totalPages));
      }

      const nextBtn = createPageButton('Next', currentPage + 1, currentPage === totalPages);
      pagination.appendChild(nextBtn);
    }

    // Create page button
    function createPageButton(text, page, disabled = false, active = false) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${active ? 'active' : ''}`;
      btn.textContent = text;
      btn.disabled = disabled;
      if (!disabled) {
        btn.onclick = () => changePage(page);
      }
      return btn;
    }

    // Create dots
    function createDots() {
      const dots = document.createElement('span');
      dots.className = 'page-btn dots';
      dots.textContent = '...';
      return dots;
    }

    // Change page
    async function changePage(newPage) {
      if (newPage >= 1 && newPage <= totalPages && newPage !== currentPage) {
        currentPage = newPage;
        await loadTenders(currentYear, currentPage);
        document.querySelector('.table-container')?.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    }

    // Handle download click with PDF modal for PDF files
    function handleTenderClick(tender, event) {
      event.preventDefault();
      event.stopPropagation();

      const filename = tender.filename;
      const natureOfWork = tender.nature_of_work || 'Tender Document';

      if (isPdfFile(filename)) {
        const pdfUrl = getTenderPdfUrl(filename);
        openTenderPdfModal(pdfUrl, natureOfWork);
      } else {
        window.open(getTenderPdfUrl(filename), '_blank');
      }
    }

    // Render tenders table
    function renderTenders(tenders) {
      const container = document.getElementById('tendersContainer');

      if (tenders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p class="bilingual-text" 
               data-hi="इस वर्ष के लिए कोई निविदा उपलब्ध नहीं है।" 
               data-en="No tenders available for this year.">
              No tenders available for this year.
            </p>
          </div>
        `;
        return;
      }

      let html = `
        <div class="table-container">
          <table class="tender-table">
            <thead>
              <tr>
                <th class="bilingual-text" data-hi="निविदा संख्या" data-en="Tender No.">Tender No.</th>
                <th class="bilingual-text" data-hi="कार्य की प्रकृति" data-en="Nature of Work">Nature of Work</th>
                <th class="bilingual-text" data-hi="निविदा तिथि" data-en="Tender Date">Tender Date</th>
                <th class="bilingual-text" data-hi="अंतिम तिथि/समय" data-en="End Date/Time">End Date/Time</th>
                <th class="bilingual-text" data-hi="विवरण" data-en="Details">Details</th>
              </tr>
            </thead>
            <tbody>
      `;

      tenders.forEach(t => {
        const newBadge = t.is_new ? '<span class="new-badge">NEW</span>' : '';
        const isPdf = isPdfFile(t.filename);

        html += `
          <tr>
            <td data-label="Tender No.">
              <span class="tender-no">${escapeHtml(t.tender_no || '—')}</span>${newBadge}
             </td>
            <td data-label="Nature of Work">${escapeHtml(t.nature_of_work || '—')}</td>
            <td data-label="Tender Date">
              <span class="tender-date">${formatDate(t.tender_date)}</span>
             </td>
            <td data-label="End Date/Time">
              <span class="tender-date">${formatDateTime(t.tender_end_date)}</span>
             </td>
            <td data-label="Details">
              <button class="download-link tender-view-btn"
                      data-filename="${escapeHtml(t.filename || '')}"
                      data-name="${escapeHtml(t.nature_of_work || 'Tender Document')}"
                      data-is-pdf="${isPdf}"
                      data-url="/assets/files/tenders/${escapeHtml(t.filename || '')}">
                ${isPdf ? 'View Tender' : 'Download'}
              </button>
             </td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
      `;

      container.innerHTML = html;

      // Attach click handlers to all tender view buttons
      document.querySelectorAll('.tender-view-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const filename = btn.getAttribute('data-filename');
          const name = btn.getAttribute('data-name');
          const isPdf = btn.getAttribute('data-is-pdf') === 'true';
          const url = btn.getAttribute('data-url');

          if (isPdf && filename) {
            openTenderPdfModal(url, name);
          } else {
            window.open(url, '_blank');
          }
        });
      });
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleDateString('en-IN', {
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        });
      } catch (e) {
        return '—';
      }
    }

    // Format datetime
    function formatDateTime(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleString('en-IN', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        });
      } catch (e) {
        return '—';
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

  <!-- INCLUDE BILINGUAL LOGIC -->
  <script src="/UI/bilingual.js"></script>

</body>
