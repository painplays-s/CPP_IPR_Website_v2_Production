<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDFs/Research Scholars - CPP-IPR</title>

  <style>
    :root {
      --people-bg: #ffffff;
      --people-border: #d0d7e2;
      --people-text: #111827;
      --people-muted: #6b7280;
      --people-accent: #2563eb;
      --people-radius-lg: 16px;
      --section-bg: #f9fafb;
      --badge-pdf: #059669;
      --badge-srf: #7c3aed;
      --badge-jrf: #dc2626;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    #header-container,
    #footer-container {
      flex-shrink: 0;
    }

    main {
      flex: 1;
      padding: 1.5rem 5vw;
      box-sizing: border-box;
    }

    .page-section {
      max-width: 1600px;
      margin: 0 auto 2rem auto;
    }

    .people-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-sizing: border-box;
    }

    .people-banner {
      width: 100%;
      height: auto;
      border-radius: var(--people-radius-lg);
      object-fit: cover;
    }

    .people-main {
      position: relative;
      width: 100%;
      background: var(--people-bg);
      border: 1.5px solid var(--people-border);
      border-radius: var(--people-radius-lg);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .people-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.75rem 1rem 1.75rem;
      position: relative;
    }

    .people-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 2px;
      background-color: var(--people-border);
    }

    .people-title {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--people-text);
      text-align: center;
      margin: 0;
    }

    .people-content {
      padding: 1.75rem;
      box-sizing: border-box;
    }

    /* Category Title - centered */
    .category-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--people-text);
      margin: 0 0 1.5rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--people-border);
      text-align: center !important;
      width: 100%;
      display: block;
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    @media (min-width: 1400px) {
      .people-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .person-card {
      background: var(--section-bg);
      border: 1px solid var(--people-border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .person-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .position-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
    }

    .position-badge.pdf {
      background: var(--badge-pdf);
    }

    .position-badge.srf {
      background: var(--badge-srf);
    }

    .position-badge.jrf {
      background: var(--badge-jrf);
    }

    .person-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--people-border);
    }

    .person-info {
      text-align: center;
      width: 100%;
    }

    .person-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--people-text);
      margin: 0 0 0.25rem 0;
      line-height: 1.4;
    }

    .person-name-hi {
      font-size: 0.9rem;
      color: var(--people-muted);
      margin: 0 0 0.75rem 0;
      line-height: 1.4;
    }

    .person-lab {
      font-size: 0.9rem;
      color: var(--people-accent);
      margin: 0 0 0.75rem 0;
      line-height: 1.3;
      font-style: italic;
    }

    .person-contact {
      font-size: 0.85rem;
      color: var(--people-muted);
      margin: 0.25rem 0;
    }

    .person-contact strong {
      color: var(--people-text);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--people-muted);
      font-size: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--people-muted);
      font-size: 1rem;
    }

    @media (max-width: 1200px) {
      .people-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .people-title {
        font-size: 1.35rem;
      }

      .category-title {
        font-size: 1.15rem;
        text-align: center !important;
      }

      .people-header {
        padding: 1.25rem 1.25rem 0.85rem 1.25rem;
      }

      .people-header::after {
        width: 80%;
      }

      .people-content {
        padding: 1.5rem 1.25rem;
      }

      .people-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.25rem;
      }

      .person-card {
        padding: 1.25rem;
      }

      .person-photo {
        width: 100px;
        height: 100px;
      }

      .person-name {
        font-size: 0.95rem;
      }

      .person-name-hi {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 600px) {
      .people-grid {
        grid-template-columns: 1fr;
      }

      .category-title {
        font-size: 1.1rem;
        text-align: center !important;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- PAGE CONTENT -->
  <main>
    <div class="page-section people-section">

      <!-- BANNER IMAGE -->
      <img src="/assets/images/about_banner.jpg" alt="CPP-IPR Banner" class="people-banner">

      <!-- SCHOLARS SECTION -->
      <div class="people-main">

        <!-- HEADER INSIDE BOX -->
        <div class="people-header">
          <h1 class="people-title bilingual-title" data-hi="पीडीएफ/शोध छात्र" data-en="PDFs/Research Scholars">
            PDFs/Research Scholars
          </h1>
        </div>

        <!-- CONTENT -->
        <div class="people-content">
          <div id="scholars-container">
            <div class="loading">Loading research scholars...</div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- FRAGMENT LOADER -->
  <script>
    function loadFragment(url, containerId) {
      fetch(url)
        .then(res => res.text())
        .then(html => {
          const container = document.getElementById(containerId);
          container.innerHTML = html;

          container.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            oldScript.replaceWith(newScript);
          });
        })
        .catch(err => console.error('Error loading fragment:', url, err));
    }

    loadFragment('/UI/header.html', 'header-container');
    loadFragment('/UI/footer.html', 'footer-container');
  </script>

  <!-- LOAD SCHOLARS -->
  <script>
    let currentLang = localStorage.getItem('language') || 'en';

    async function loadScholars() {
      try {
        const response = await fetch('/api/people/scholars');
        const scholars = await response.json();

        const container = document.getElementById('scholars-container');

        if (scholars.length === 0) {
          container.innerHTML = '<div class="empty-state">No research scholars available at the moment.</div>';
          return;
        }

        // Group scholars by position for better organization
        const grouped = {};
        scholars.forEach(person => {
          const position = person.position || 'Other';
          if (!grouped[position]) {
            grouped[position] = [];
          }
          grouped[position].push(person);
        });

        // Render grouped scholars
        let html = '';

        // Define order of positions
        const positionOrder = ['PDF', 'SRF', 'JRF'];

        // Sort positions according to order
        const sortedPositions = Object.keys(grouped).sort((a, b) => {
          const indexA = positionOrder.indexOf(a);
          const indexB = positionOrder.indexOf(b);
          if (indexA === -1) return 1;
          if (indexB === -1) return -1;
          return indexA - indexB;
        });

        for (const position of sortedPositions) {
          const people = grouped[position];

          // Position label in both languages
          const positionLabel = {
            en: position,
            hi: position === 'PDF' ? 'पीडीएफ' : position === 'SRF' ? 'एसआरएफ' : 'जेआरएफ'
          };

          html += `
            <div class="sub-category" style="margin-bottom: 2rem;">
              <h2 class="category-title bilingual-title" 
                  data-hi="${positionLabel.hi}" 
                  data-en="${positionLabel.en}">
                ${currentLang === 'hi' ? positionLabel.hi : positionLabel.en}
              </h2>
              <div class="people-grid">
                ${people.map(person => `
                  <div class="person-card">
                    <span class="position-badge ${person.position.toLowerCase()}">${person.position}</span>
                    <img src="/assets/images/people/${person.photo}" 
                         alt="${person.name_en}" 
                         class="person-photo"
                         onerror="this.src='/assets/images/placeholder.jpg'">
                    <div class="person-info">
                      <p class="person-name">${currentLang === 'hi' ? person.name_hi : person.name_en}</p>
                      <p class="person-name-hi">${currentLang === 'hi' ? person.name_en : person.name_hi}</p>
                      <p class="person-lab">${currentLang === 'hi' ? person.lab_hi : person.lab_en}</p>
                      <p class="person-contact"><strong>Email:</strong> ${person.email}</p>
                      <p class="person-contact"><strong>Extn:</strong> ${person.extn_no}</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }

        container.innerHTML = html;
        updateBilingualContent();
      } catch (error) {
        console.error('Error loading scholars:', error);
        document.getElementById('scholars-container').innerHTML =
          '<div class="empty-state">Failed to load research scholars. Please try again later.</div>';
      }
    }

    function updateBilingualContent() {
      const lang = localStorage.getItem('language') || 'en';

      document.querySelectorAll('.bilingual-title').forEach(el => {
        const hiText = el.getAttribute('data-hi');
        const enText = el.getAttribute('data-en');

        if (hiText && enText) {
          el.textContent = lang === 'hi' ? hiText : enText;
        }
      });
    }

    window.addEventListener('languageChanged', (e) => {
      currentLang = e.detail.language;
      loadScholars();
    });

    loadScholars();
  </script>

  <!-- INCLUDE BILINGUAL LOGIC -->
  <script src="/UI/bilingual.js"></script>

</body>

</html>
